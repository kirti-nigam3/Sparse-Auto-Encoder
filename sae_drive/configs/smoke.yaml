# Smoke-test config used by `make_dummy_data.py`.
# Overrides default.yaml with tiny dimensions so the full train loop runs on a
# laptop GPU or CPU in a few minutes.

experiment:
  name: sae_drive_smoke
  seed: 0
  output_dir: runs/smoke
  device: cuda                                  # change to cpu if no GPU
  mixed_precision: true
  log_to_wandb: false
  wandb_project: sae-drive
  wandb_entity: null
  log_to_tensorboard: true

data:
  video_root: data_demo
  flow_root: data_demo/flow
  ego_root: data_demo/ego
  manifest: data_demo/manifest.json
  split_train: train
  split_val: val
  fps: 10
  source_fps: 30
  clip_length: 16
  future_horizon: 4
  clip_stride: 8
  image_height: 112
  image_width: 192
  flow_downscale: 4
  min_ego_speed_kmh: 0.0
  augment:
    horizontal_flip: true
    color_jitter: true
    speed_jitter: false
    temporal_jitter_frames: 1
    temporal_reverse_prob: 0.0

model:
  encoder:
    type: hybrid
    in_channels: 3
    stem_channels: 32
    feature_channels: 128
    embed_dim: 256
    transformer_layers: 2
    transformer_heads: 4
    transformer_mlp_ratio: 2.0
    dropout: 0.0
  bottleneck:
    type: topk_sae
    latent_dim: 512
    topk: 16
    normalize_decoder: true
    dead_neuron_window: 200
    dead_neuron_threshold: 0.001
  decoder:
    flow_horizon: 4
    flow_channels: 2
    flow_hidden_dim: 64
    ego_dim: 3
    ego_hidden_dim: 64

loss:
  lambda_recon: 1.0
  lambda_sparse_initial: 0.0
  lambda_sparse_final: 0.02
  lambda_sparse_warmup_steps: 100
  lambda_future_initial: 0.5
  lambda_future_final: 1.0
  lambda_future_warmup_steps: 200
  lambda_temporal: 0.0
  lambda_dead: 0.01
  lambda_ego: 0.5
  lambda_flow: 1.0
  sparsity_type: l1

training:
  epochs: 2
  batch_size: 2
  num_workers: 2
  prefetch_factor: 2
  pin_memory: true
  optimizer: adamw
  learning_rate: 3.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  grad_clip_norm: 1.0
  lr_scheduler: cosine
  lr_warmup_steps: 50
  log_every_n_steps: 10
  val_every_n_epochs: 1
  save_every_n_epochs: 1
  resume_from: null

evaluation:
  num_clips_for_umap: 256
  umap_n_neighbors: 8
  umap_min_dist: 0.1
  umap_metric: cosine
  hdbscan_min_cluster_size: 10
  hdbscan_min_samples: 3
  topk_clips_per_neuron: 8
